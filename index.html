<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI의 이상한 챌린지 🎲</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-blobs">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>

  <div class="container">
    <header>
      <div class="logo">🎲</div>
      <h1>AI의 이상한 챌린지</h1>
      <p class="subtitle">지금 주변 환경을 알려주면 AI가 황당하고 기발한 도전과제를 만들어드립니다</p>
    </header>

    <!-- 입력 섹션 -->
    <section class="card" id="input-card">
      <h2>🌍 지금 주변 환경을 알려주세요</h2>

      <div class="tag-group">
        <p class="tag-label">📍 어디 계세요?</p>
        <div class="tags" id="location-tags">
          <button class="tag" onclick="toggleTag(this,'location')">🏠 집</button>
          <button class="tag" onclick="toggleTag(this,'location')">🏫 학교</button>
          <button class="tag" onclick="toggleTag(this,'location')">☕ 카페</button>
          <button class="tag" onclick="toggleTag(this,'location')">🏢 도서관</button>
          <button class="tag" onclick="toggleTag(this,'location')">🚇 지하철</button>
          <button class="tag" onclick="toggleTag(this,'location')">🌳 공원</button>
        </div>
      </div>

      <div class="tag-group">
        <p class="tag-label">🕐 몇 시쯤이에요?</p>
        <div class="tags" id="time-tags">
          <button class="tag" onclick="toggleTag(this,'time')">🌅 아침</button>
          <button class="tag" onclick="toggleTag(this,'time')">☀️ 낮</button>
          <button class="tag" onclick="toggleTag(this,'time')">🌇 저녁</button>
          <button class="tag" onclick="toggleTag(this,'time')">🌙 밤</button>
        </div>
      </div>

      <div class="tag-group">
        <p class="tag-label">😶 지금 기분은요?</p>
        <div class="tags" id="mood-tags">
          <button class="tag" onclick="toggleTag(this,'mood')">😴 졸림</button>
          <button class="tag" onclick="toggleTag(this,'mood')">😐 무료함</button>
          <button class="tag" onclick="toggleTag(this,'mood')">😤 스트레스</button>
          <button class="tag" onclick="toggleTag(this,'mood')">😄 신남</button>
          <button class="tag" onclick="toggleTag(this,'mood')">🥺 우울</button>
          <button class="tag" onclick="toggleTag(this,'mood')">🤔 생각중</button>
        </div>
      </div>

      <div class="tag-group">
        <p class="tag-label">✏️ 주변에 뭐가 있나요? (선택사항)</p>
        <textarea id="surroundings" placeholder="예: 의자, 노트북, 물병, 이어폰, 창문, 사람들..." rows="2"></textarea>
      </div>

      <button class="btn-generate" id="gen-btn" onclick="generateChallenge()">
        <span id="btn-text">도전과제 생성하기 🎲</span>
      </button>
    </section>

    <!-- 결과 섹션 -->
    <section class="card result-card hidden" id="result-card">
      <div class="loading hidden" id="loading">
        <div class="dots">
          <span></span><span></span><span></span>
        </div>
        <p>AI가 황당한 챌린지를 고안 중입니다…</p>
      </div>

      <div class="result hidden" id="result"></div>

      <div class="btn-row hidden" id="result-btns">
        <button class="btn-secondary" onclick="generateChallenge()">다른 챌린지 🔄</button>
        <button class="btn-secondary" onclick="resetAll()">처음으로</button>
      </div>
    </section>
  </div>

  <script src="secret.js"></script>
  <script src="app.js"></script>
</body>
</html>
